<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBM4/HBM4E Presentation - PowerPoint Exporter</title>
  
  <!-- Space Grotesk Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- PptxGenJS CDN -->
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>

  <style>
    :root {
      --bg-color: #050816;
      --card-bg: rgba(12, 15, 28, 0.86);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-color: #F5F7FA;
      --text-muted: #8E9FB6;
      --gemini-blue: #4285F4;
      --gemini-purple: #9B72CB;
      --gemini-pink: #D96BBA;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-image: radial-gradient(circle at 50% 50%, #0F122D 0%, #050816 100%);
    }

    .container {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 40px;
      max-width: 550px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 20px;
      padding: 1px;
      background: linear-gradient(135deg, var(--gemini-blue), var(--gemini-purple), var(--gemini-pink));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.05);
      border-top-color: var(--gemini-purple);
      border-radius: 50%;
      margin: 0 auto 25px;
      animation: spin 1s infinite linear;
      box-shadow: 0 0 15px rgba(155, 114, 203, 0.3);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    button {
      background: linear-gradient(135deg, var(--gemini-blue), var(--gemini-purple));
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(66, 133, 244, 0.3);
      transition: var(--transition-smooth);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(66, 133, 244, 0.4);
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: var(--transition-smooth);
    }

    .back-link:hover {
      color: var(--gemini-blue);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h2 id="status-title">Generating Presentation Slides</h2>
    <p id="status-desc">Compiling layout elements, ECE presentation notes, and structural attributes into a 16:9 widescreen PowerPoint deck...</p>
    <button id="manualBtn" style="display: none;">Download PPTX Manually</button>
    <br>
    <a href="index.html" class="back-link">Return to Slide Presentation</a>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Delay slightly to ensure script assets render
      setTimeout(exportPPTX, 800);
    });

    function exportPPTX() {
      const statusTitle = document.getElementById("status-title");
      const statusDesc = document.getElementById("status-desc");
      const spinner = document.getElementById("spinner");
      const manualBtn = document.getElementById("manualBtn");

      try {
        let pptx = new PptxGenJS();
        
        // Use standard 16:9 widescreen dimensions
        pptx.layout = 'LAYOUT_16x9';

        const themeBg = { color: '0A0B14' };
        const fontTitle = 'Segoe UI';
        const fontBody = 'Segoe UI';

        const setSlideSetup = (slide) => {
          slide.background = themeBg;
        };

        // ==========================================
        // SLIDE 1: Title Cover
        // ==========================================
        let s1 = pptx.addSlide();
        setSlideSetup(s1);
        
        s1.addText("High Bandwidth Memory (HBM4/HBM4E)", {
          x: 0.8, y: 1.8, w: 11.5, h: 1.5,
          fontSize: 44, bold: true, color: 'FFFFFF', fontFace: fontTitle
        });

        s1.addText([
          { text: "Presented by: ", options: { fontSize: 20, color: '9B72CB', fontFace: fontBody, bold: true } },
          { text: "Jai Akash T\n", options: { fontSize: 24, color: 'FFFFFF', fontFace: fontBody, bold: true } },
          { text: "Register Number: ", options: { fontSize: 18, color: '9B72CB', fontFace: fontBody, bold: true } },
          { text: "243115106037\n", options: { fontSize: 20, color: 'FFFFFF', fontFace: fontBody, bold: true } },
          { text: "Class Section: ", options: { fontSize: 18, color: '9B72CB', fontFace: fontBody, bold: true } },
          { text: "ECE-3A", options: { fontSize: 20, color: 'FFFFFF', fontFace: fontBody, bold: true } }
        ], {
          x: 0.8, y: 3.2, w: 11.5, h: 1.8,
          lineSpacing: 10
        });

        s1.addText("A simple guide to the 3D-stacked vertical silicon chip structures, microscopic vertical copper wire connects, and high-speed lanes powering next-gen AI supercomputers.", {
          x: 0.8, y: 4.8, w: 11.0, h: 1.2,
          fontSize: 16, color: '8E9FB6', fontFace: fontBody
        });

        // ==========================================
        // SLIDE 2: Memory Bottleneck
        // ==========================================
        let s2 = pptx.addSlide();
        setSlideSetup(s2);
        s2.addText("Memory Bottleneck in Modern AI Computing", {
          x: 0.8, y: 0.5, w: 11.0, h: 0.8,
          fontSize: 36, bold: true, color: 'FFFFFF', fontFace: fontTitle
        });
        
        s2.addText("THE LAYMAN WAREHOUSE ANALOGY", {
          x: 0.8, y: 1.5, w: 5.2, h: 0.4,
          fontSize: 18, bold: true, color: '4285F4', fontFace: fontTitle
        });
        s2.addText("• DDR Memory is like a warehouse built far away from the factory (GPU).\n• Trucks (signals) take a long time to travel back and forth on narrow highways.\n• HBM4 stacks 16 warehouses directly on top of the factory and links them using fast elevators.", {
          x: 0.8, y: 2.1, w: 5.2, h: 4.0,
          fontSize: 16, color: 'FFFFFF', fontFace: fontBody, lineSpacing: 24
        });

        s2.addText("TECHNICAL CHALLENGES WITH DDR", {
          x: 6.8, y: 1.5, w: 5.2, h: 0.4,
          fontSize: 18, bold: true, color: 'D96BBA', fontFace: fontTitle
        });
        s2.addText("• Processor Speeds have scaled up by 1000x over recent years.\n• Memory Bandwidth has only grown by 10x, leaving high-performance engines starving for data.\n• Flat Motherboard designs have hit a physical routing limit, preventing wider data highways.", {
          x: 6.8, y: 2.1, w: 5.2, h: 4.0,
          fontSize: 16, color: 'FFFFFF', fontFace: fontBody, lineSpacing: 24
        });

        // ==========================================
        // SLIDE 3: Evolution Timeline
        // ==========================================
        let s3 = pptx.addSlide();
        setSlideSetup(s3);
        s3.addText("Evolution of High Bandwidth Memory", {
          x: 0.8, y: 0.5, w: 11.0, h: 0.8,
          fontSize: 36, bold: true, color: 'FFFFFF', fontFace: fontTitle
        });
        s3.addText("• HBM1 (2013): 1st gen stack with 1024-bit width. 1 GB capacity, 128 GB/s bandwidth.\n• HBM2 (2016): Capacity expanded to 8 GB. Pins rate scaled to 2.0 Gbps (256 GB/s bandwidth).\n• HBM3 (2022): 24 GB capacity. Pin rate scaled up to 6.4 Gbps, yielding 819 GB/s bandwidth.\n• HBM3E (2024): 36 GB capacity, transferring data speeds up to 9.6 Gbps (1.2 TB/s bandwidth).\n• HBM4 (2025/2026): Doubled bus width (2048-bit). Custom logic base dies on advanced foundry nodes.", {
          x: 0.8, y: 1.6, w: 11.5, h: 4.8,
          fontSize: 18, color: 'FFFFFF', fontFace: fontBody, lineSpacing: 24
        });

        // ==========================================
        // SLIDE 4: Architectural Breakdown
        // ==========================================
        let s4 = pptx.addSlide();
        setSlideSetup(s4);
        s4.addText("HBM4 Architectural Breakdown", {
          x: 0.8, y: 0.5, w: 11.0, h: 0.8,
          fontSize: 36, bold: true, color: 'FFFFFF', fontFace: fontTitle
        });
        s4.addText("• Silicon Interposer: The horizontal highway that connects the GPU side-by-side with the HBM Memory stack.\n• Custom Logic Base Die: The brain of the HBM stack. Built on advanced foundry nodes (TSMC/Samsung/Intel) to route signals.\n• DRAM Stack (12/16-High): Thin memory layers stacked vertically on top of the logic die to maximize capacity.\n• Microbumps & TSVs: Vertical connections that link the stacked layers to the base logic die.", {
          x: 0.8, y: 1.6, w: 11.5, h: 4.8,
          fontSize: 18, color: 'FFFFFF', fontFace: fontBody, lineSpacing: 26
        });

        // ==========================================
        // SLIDE 5: 3D Packaging & Operations
        // ==========================================
        let s5 = pptx.addSlide();
        setSlideSetup(s5);
        s5.addText("3D Stacking & Processor Access Simulation", {
          x: 0.8, y: 0.5, w: 11.0, h: 0.8,
          fontSize: 36, bold: true, color: 'FFFFFF', fontFace: fontTitle
        });
        s5.addText("HBM4 stacks memory layers vertically to bypass physical spacing limits, integrating 4 core operations:", {
          x: 0.8, y: 1.3, w: 11.5, h: 0.5,
          fontSize: 16, color: '8E9FB6', fontFace: fontBody, italic: true
        });
        s5.addText("• Instruction Fetch (IF): High-speed green data flows routing instruction codes from HBM stack to CPU cores.\n• Data Read (RD): Standard blue signals transferring operands and parameters from HBM columns to GPU cores.\n• Data Write (WR): Pink data signals routing processed calculations back from GPU cores into DRAM cell rows.\n• Memory Refresh (RF): Amber sequencing sweeps that periodically recharge capacitive cells inside DRAM dies.", {
          x: 0.8, y: 2.0, w: 11.5, h: 4.5,
          fontSize: 18, color: 'FFFFFF', fontFace: fontBody, lineSpacing: 26
        });

        // ==========================================
        // SLIDE 6: Performance & Specs
        // ==========================================
        let s6 = pptx.addSlide();
        setSlideSetup(s6);
        s6.addText("Performance Metrics & Specifications", {
          x: 0.8, y: 0.5, w: 11.0, h: 0.8,
          fontSize: 36, bold: true, color: 'FFFFFF', fontFace: fontTitle
        });
        
        s6.addText("BANDWIDTH PERFORMANCE", {
          x: 0.8, y: 1.6, w: 5.0, h: 0.4,
          fontSize: 18, bold: true, color: '4285F4', fontFace: fontTitle
        });
        s6.addText("• DDR5: 38.4 GB/s (Baseline flat bus)\n• GDDR7: 192 GB/s (Dedicated graphics standard)\n• HBM3E: 1228 GB/s (Legacy stacked standard)\n• HBM4: 2048 GB/s (Widescreen 2048-bit bus standard)\n• HBM4E: 2457+ GB/s (Enhanced performance peak)", {
          x: 0.8, y: 2.1, w: 5.0, h: 4.0,
          fontSize: 15, color: 'FFFFFF', fontFace: fontBody, lineSpacing: 22
        });

        // Add spec table to s6
        let rows = [
          [
            { text: "Feature Metric", options: { bold: true, color: "9B72CB" } },
            { text: "HBM4 Standard", options: { bold: true, color: "9B72CB" } },
            { text: "HBM4E (Enhanced)", options: { bold: true, color: "9B72CB" } }
          ],
          ["Max Capacity", "Up to 48 GB", "Up to 64 GB"],
          ["Bus Width", "2048-bit / 32 Ch", "2048-bit / 32 Ch"],
          ["Data Pin Speed", "8.0 Gbps", "9.6+ Gbps"],
          ["Peak Bandwidth", "2.0 TB/s", "2.45+ TB/s"],
          ["Logic Node", "TSMC Custom N5", "TSMC Custom N5"],
          ["Stacking Height", "12 / 16 Layers", "12 / 16 Layers"]
        ];
        s6.addTable(rows, {
          x: 6.2, y: 1.6, w: 6.3, h: 4.5,
          fontFace: fontBody, fontSize: 13, color: 'FFFFFF',
          border: { pt: 1, color: '2A2F45' }
        });

        // ==========================================
        // SLIDE 7: Manufacturing Flow & Thermals
        // ==========================================
        let s7 = pptx.addSlide();
        setSlideSetup(s7);
        s7.addText("Manufacturing & Thermal Management", {
          x: 0.8, y: 0.5, w: 11.0, h: 0.8,
          fontSize: 36, bold: true, color: 'FFFFFF', fontFace: fontTitle
        });
        
        s7.addText("3D MANUFACTURING WORKFLOW", {
          x: 0.8, y: 1.6, w: 5.8, h: 0.4,
          fontSize: 18, bold: true, color: '4285F4', fontFace: fontTitle
        });
        s7.addText("• 01. TSV Drilling: Deep RIE lasers drill microscopic channels straight through wafers, filling them with copper to construct vertical conduits.\n• 02. Wafer Thinning: Silicon substrates are ground down to paper-thin ~30μm dimensions to enable multi-layered stacking heights.\n• 03. Hybrid Bonding: Direct atomic Copper-to-Copper fusion merges DRAM layers together, dropping pad pitches below 10μm.", {
          x: 0.8, y: 2.1, w: 5.8, h: 4.2,
          fontSize: 14, color: 'FFFFFF', fontFace: fontBody, lineSpacing: 22
        });

        s7.addText("THERMAL HEAT DISSIPATION MAP", {
          x: 7.0, y: 1.6, w: 5.5, h: 0.4,
          fontSize: 18, bold: true, color: 'D96BBA', fontFace: fontTitle
        });
        s7.addText("• Thermal Penalty: Stacking 16 hot memory layers traps high-power heat in the core logic.\n• TIM Materials: Advanced interface materials with high thermal conductivity conduct heat up to top lids.\n• Dummy Vias: Unconnected dummy TSVs are placed inside memory layers to act as passive heat pipeline guides.\n• Top cap: 45°C | Stack core: 78°C | Logic die: 60°C", {
          x: 7.0, y: 2.1, w: 5.5, h: 4.2,
          fontSize: 14, color: 'FFFFFF', fontFace: fontBody, lineSpacing: 22
        });

        // ==========================================
        // SLIDE 8: Thank You
        // ==========================================
        let s8 = pptx.addSlide();
        setSlideSetup(s8);
        s8.addText("THANK YOU", {
          x: 1.0, y: 2.8, w: 11.3, h: 1.8,
          fontSize: 64, bold: true, color: 'FFFFFF', fontFace: fontTitle,
          align: 'center'
        });

        // Save file & Trigger browser download
        pptx.writeFile({ fileName: "HBM4_HBM4E_Showcase.pptx" }).then(() => {
          statusTitle.innerText = "Download Ready!";
          statusDesc.innerText = "Your PowerPoint presentation file (HBM4_HBM4E_Showcase.pptx) has been generated and downloaded successfully.";
          spinner.style.display = "none";
          manualBtn.style.display = "inline-block";
        }).catch(err => {
          console.error(err);
          statusTitle.innerText = "Generation Failed";
          statusDesc.innerText = "An error occurred while compiling your PowerPoint presentation.";
          spinner.style.display = "none";
          manualBtn.style.display = "inline-block";
        });

        // Bind manual download button
        manualBtn.addEventListener("click", () => {
          pptx.writeFile({ fileName: "HBM4_HBM4E_Showcase.pptx" });
        });

      } catch (e) {
        console.error(e);
        statusTitle.innerText = "Export Error";
        statusDesc.innerText = e.message;
        spinner.style.display = "none";
        manualBtn.style.display = "inline-block";
      }
    }
  </script>
</body>
</html>
